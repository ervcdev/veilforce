[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer = true
optimizer_runs = 200
# Somnia testnet needs higher gas limits than default estimates for CREATE txs
gas_limit = 30000000
block_gas_limit = 30000000

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"

[etherscan]
somnia_testnet = { 
  key     = "${ETHERSCAN_API_KEY}", 
  url     = "https://shannon-explorer.somnia.network/api",
  chain   = 50312
}

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true